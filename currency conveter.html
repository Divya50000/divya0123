<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>currency converter</title>
</head>
<body>
    <h2>currency converter</h2>
    <label amount:></label>
    <input type="number"id= amount placeholder="Enter amount"><br><br>

    <label>from:</label>
    <select id="fromCurrency">
    <option value="USD">USD</option>
    <option value="EUR">EUR</option>
    <option value="INR">INR</option>
    </select>

    <label>to:</label>
    <select id="toCurrency">
    <option value="USD">USD</option>
    <option value="EUR">EUR</option>
    <option value="INR">INR</option>
    </select><br><br>

    <button onclick="convertCurrency()">convert</button>
    <h3 id="result"></h3>

    <script>
    const rates ={
        USD:{USD:1,EUR:0.92,INR:83},
        EUR:{USD:1.09,EUR:1,INR:90},
        INR:{USD:0.012,EUR:0.011,INR:1},
    }
    function convertCurrency(){
        const amount =parseFloat(document.getElementById("amount").value);
        const from =document.getElementById("fromCurrency").value;
        const to =document.getElementById("toCurrency").value;

    if (! amount || amount<0){
        document.getElementById ("result").
        innerText="Please Enter a valid amount";
    }
    const rat= rates[from][to];
    const converted= amount*rat;

    document.getElementById("result").innerText=`${amount} ${from}= ${converted.toFixed(2)} ${to}`;

    }   

    
    </script>


</body>
</html>
