<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h4>Random password Generator</h4>
  <label for="length">password length:</label>
  <input type="number"id= "length" value="8"min="4"max="32"><br><br>
  <button onclick="generatepassword ()">Generate password</button><br><br>
  <input type="text"id="password"readonly style="width: 300px;font-size: 16px;">
  <script>
    function generatepassword(){
      const length= document.getElementById("length").value;
      const chars="ABCDEFGHIJKLMNabcdefghijklmn1234567890*/&^%$#@";
      let password="";
      for(let i=0; i<length;i++){
        const randomIndex= Math.floor(Math.random()*chars.length);
        password+= chars[randomIndex];
      }
      document.getElementById("password").value=password;
    }
  </script>

</body>
</html>
