<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=>, initial-scale=1.0">
    <title>Document</title>
  
</head>
<body>
    <label for="email">Enter your Email:</label>
   <input type="email"name="email" id="email" placeholder="enter your email">
   <span id="msg"></span><br><br>



   <label for="password">Enter your password:</label>
   <input type="password"name="password" id="password" placeholder="enter your pasword">
   <span id="psmsg"></span><br><br>

   <label for="number">Enter your number:</label>
   <input type="number"name="number" id="number" placeholder="enter your number">
   <span id="nmsg"></span><br><br>

    <button id="submit">submit</button>
    <button type="reset">reset</button>
    
   <script>
     document.getElementById("email").addEventListener("input",function(){
        const email=this.value;
 const msg=document.getElementById("msg");



  if (email.includes("@")&&email.includes(".com")){
     msg.textContent="valid email ✔";
    msg.style.color="green";
 }
 else{
    msg.textContent="invalid email ✖";
    msg.style.color="red";
}
    });
        document.getElementById("password").addEventListener("input",function(){
        const password=this.value;
const psmsg=document.getElementById("psmsg");

    if (password.includes("@")&& password.length >=8){
    psmsg.textContent="valid password ✔";
    psmsg.style.color="green";
}
else{
    psmsg.textContent="invalid pasword ✖";
    psmsg.style.color="red";
 }
       });
               document.getElementById("number").addEventListener("input",function(){
        const number=this.value;
const nmsg=document.getElementById("nmsg");

    if (number.length ==10){
    nmsg.textContent="valid number ✔";
    nmsg.style.color="green";
}
else{
    nmsg.textContent="invalid number ✖";
    nmsg.style.color="red";
}
        });
   </script>
</body>
</html>
